name: portfolio_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.3
  url_launcher: ^6.3.1
  go_router: ^15.1.2
  get_it: ^8.0.3
  dartz: ^0.10.1
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  geolocator: ^13.0.2
  flutter_svg: ^2.0.9
  intl: ^0.19.0
  flutter_native_splash: ^2.3.5
  flutter_spinkit: ^5.2.0
  persistent_bottom_nav_bar: ^6.2.1
  dio: ^5.3.3
  shared_preferences: ^2.2.2
  liquid_pull_to_refresh: ^3.0.1
  shimmer: ^3.0.0
  syncfusion_flutter_pdfviewer: ^28.2.3
  internet_connection_checker: ^1.0.0+1
  connectivity_plus: ^5.0.2
  pusher_channels_flutter: ^2.2.0
  flutter_markdown: ^0.7.1
  timeline_tile: ^2.0.0
  #  carousel_slider: ^4.2.1
  new_version_plus: ^0.1.0
  url_launcher_ios: ^6.2.4
  sensors_plus: ^6.1.1
  flutter_riverpod: ^2.4.9
  file_picker: ^8.0.7
  video_player: ^2.8.2
  flutter_flow_chart: ^3.2.1
  graphite: ^1.1.2
  wheel_slider: ^1.2.1
  flutter_local_notifications: ^18.0.1
  firebase_database: ^12.3.0
  firebase_messaging: ^16.2.0
  textfield_tags: ^3.0.1
  device_info_plus: ^11.2.2
  lottie: ^3.3.1
  flutter_speed_dial: ^7.0.0
  pretty_dio_logger: ^1.4.0
  flutter_screenutil: ^5.9.3
  logscope_flutter: ^0.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logos/essamLogo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/logos/essamLogo.png"
  #    background_color: "#hexcode"
  #    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/logos/essamLogo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/logos/essamLogo.png"

  flutter_lints: ^5.0.0

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/icons/
    - assets/pdfs/
    - assets/logos/
    - assets/png/
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: FiraCode-Regular
      fonts:
        - asset: assets/fonts/FiraCode-Regular.ttf

  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package