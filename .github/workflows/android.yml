name: Android Beta Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: macos-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true
      ANDROID_SDK_ROOT: /Users/runner/Library/Android/sdk

    steps:
      # ================= Checkout =================
      - name: Checkout
        uses: actions/checkout@v4

      # ================= Flutter =================
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.6
          cache: true

      - name: Cache Pub Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Install dependencies
        run: flutter pub get

      # ================= Java =================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ================= ANDROID SDK FIX (IMPORTANT) =================
      - name: Setup Android SDK Tools PATH
        run: |
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Required SDKs
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.2" \
                     "cmake;3.22.1" || true

      # ================= Gradle Cache =================
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/cache
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ================= Firebase CLI =================
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # ================= FASTLANE (NO BUNDLER) =================
      - name: Install Fastlane
        run: gem install fastlane --no-document

      # ================= Build =================
      - name: Build APK with Fastlane
        run: |
          cd android
          fastlane android beta
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}